<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>阿彌陀佛四十八願易解．極樂世界的二十九種莊嚴（合刊）</title>
<style>
  :root{
    --paper:#faf6ee;
    --ink:#2b2320;
    --deep-green:#1f4d3d;
    --brick:#8a3b2b;
    --gold:#b08d4f;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  header{
    text-align:center;
    padding:18px 12px 10px;
  }
  header a.home-link{
    color:var(--deep-green);
    text-decoration:none;
    font-size:14px;
    letter-spacing:1px;
    border-bottom:1px solid var(--deep-green);
    padding-bottom:2px;
  }
  h1{
    margin:10px 0 4px;
    font-size:22px;
    color:var(--deep-green);
    font-weight:700;
    letter-spacing:1px;
  }
  .subtitle{
    margin:0 0 6px;
    font-size:12.5px;
    color:var(--brick);
    letter-spacing:1.5px;
  }
  .book-stage{
    display:flex;
    justify-content:center;
    padding:6px 0 4px;
  }
  .book{
    position:relative;
    width:min(92vw,520px);
    aspect-ratio:414/583;
    background:#ffffff;
    border-radius:6px;
    box-shadow:0 6px 24px rgba(0,0,0,.18);
    overflow:hidden;
    touch-action:pan-y pinch-zoom;
    user-select:none;
  }
  .page{
    position:absolute;
    inset:0;
    visibility:hidden;
    opacity:0;
    transition:opacity .35s ease;
  }
  .page.in-view{visibility:visible;}
  .page.current{opacity:1;}
  .page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:#ffffff;
  }
  .nav-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:12px 10px 4px;
  }
  .nav-btn{
    background:var(--deep-green);
    color:#fff;
    border:none;
    width:42px;height:42px;
    border-radius:50%;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .nav-btn:disabled{opacity:.35;}
  .page-indicator{
    font-size:13.5px;
    color:var(--ink);
    min-width:120px;
    text-align:center;
  }
  .jump-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:6px 0 20px;
    font-size:13px;
  }
  .jump-row input{
    width:64px;
    padding:6px 8px;
    border:1px solid var(--gold);
    border-radius:5px;
    text-align:center;
    font-size:14px;
  }
  .jump-row button{
    padding:6px 14px;
    border:1px solid var(--deep-green);
    background:#fff;
    color:var(--deep-green);
    border-radius:5px;
    font-size:13px;
    cursor:pointer;
  }
  .loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#9a8f7f;
    font-size:13px;
  }
</style>
</head>
<body>

<header>
  <a class="home-link" href="index.html">法寶園地</a>
  <h1>阿彌陀佛四十八願易解．極樂世界的二十九種莊嚴（合刊）</h1>
  <p class="subtitle">ONLINE READING · 電子書自架</p>
</header>

<div class="book-stage">
  <div class="book" id="book"></div>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prevBtn" aria-label="上一頁">‹</button>
  <span class="page-indicator" id="pageIndicator">第 1 / 74 頁</span>
  <button class="nav-btn" id="nextBtn" aria-label="下一頁">›</button>
</div>

<div class="jump-row">
  <span>跳到第</span>
  <input type="text" inputmode="numeric" pattern="[0-9]*" id="jumpInput" placeholder="頁碼">
  <span>頁</span>
  <button id="jumpBtn">前往</button>
</div>

<script>
(function(){
  var IMG_DIR = "ac18-images/";
  var TOTAL_PAGES = 74;
  var VIEW_RADIUS = 1;

  var book = document.getElementById('book');
  var pageIndicator = document.getElementById('pageIndicator');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var jumpInput = document.getElementById('jumpInput');
  var jumpBtn = document.getElementById('jumpBtn');

  var pages = [];
  for (var i = 1; i <= TOTAL_PAGES; i++) {
    var pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    var num = String(i).padStart(4, '0');
    pageDiv.dataset.src = IMG_DIR + num + '.jpg';
    book.appendChild(pageDiv);
    pages.push(pageDiv);
  }

  var current = 1;
  var isAnimating = false;

  function updateWindow(){
    for (var i = 0; i < pages.length; i++){
      var pageNum = i + 1;
      var pageDiv = pages[i];
      if (Math.abs(pageNum - current) <= VIEW_RADIUS){
        pageDiv.classList.add('in-view');
        if (!pageDiv.querySelector('img')){
          var img = document.createElement('img');
          img.src = pageDiv.dataset.src;
          img.alt = '第 ' + pageNum + ' 頁';
          pageDiv.appendChild(img);
        }
      } else {
        pageDiv.classList.remove('in-view');
        var existing = pageDiv.querySelector('img');
        if (existing) pageDiv.removeChild(existing);
      }
      pageDiv.classList.toggle('current', pageNum === current);
    }
  }

  function showPage(n){
    if (n < 1) n = 1;
    if (n > TOTAL_PAGES) n = TOTAL_PAGES;
    current = n;
    updateWindow();
    pageIndicator.textContent = '第 ' + current + ' / ' + TOTAL_PAGES + ' 頁';
    prevBtn.disabled = (current === 1);
    nextBtn.disabled = (current === TOTAL_PAGES);
  }

  function next(){
    if (isAnimating || current >= TOTAL_PAGES) return;
    isAnimating = true;
    showPage(current + 1);
    setTimeout(function(){ isAnimating = false; }, 250);
  }
  function prev(){
    if (isAnimating || current <= 1) return;
    isAnimating = true;
    showPage(current - 1);
    setTimeout(function(){ isAnimating = false; }, 250);
  }

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  jumpBtn.addEventListener('click', function(){
    var v = parseInt(jumpInput.value, 10);
    if (!isNaN(v)) showPage(v);
  });
  jumpInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter'){
      var v = parseInt(jumpInput.value, 10);
      if (!isNaN(v)) showPage(v);
    }
  });

  // 左右滑動翻頁，攔截手勢避免與瀏覽器搶手勢造成晃動
  var touchStartX = null, touchStartY = null, touchLocked = false;
  book.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchLocked = false;
  }, {passive:true});

  book.addEventListener('touchmove', function(e){
    if (touchStartX === null || e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - touchStartX;
    var dy = e.touches[0].clientY - touchStartY;
    if (!touchLocked && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10){
      touchLocked = true;
    }
    if (touchLocked && book.style.touchAction !== 'auto'){
      e.preventDefault();
    }
  }, {passive:false});

  book.addEventListener('touchend', function(e){
    if (touchStartX === null) return;
    var dx = (e.changedTouches[0].clientX - touchStartX);
    if (touchLocked){
      if (dx < -40) next();
      else if (dx > 40) prev();
    }
    touchStartX = null; touchStartY = null; touchLocked = false;
  });

  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
  });

  // 放大（雙指縮放）後允許左右平移，縮回原尺寸時恢復左右滑動＝翻頁
  function updateZoomState(){
    if (!window.visualViewport) return;
    var zoomedIn = window.visualViewport.scale > 1.02;
    book.style.touchAction = zoomedIn ? 'auto' : 'pan-y pinch-zoom';
  }
  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', updateZoomState);
    window.visualViewport.addEventListener('scroll', updateZoomState);
  }

  showPage(1);
})();
</script>

</body>
</html>
