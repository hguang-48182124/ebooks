<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>佛說阿彌陀經通贊疏 · 線上電子書</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root{
    --paper: #EDE7D6; --paper-deep: #E2DAC3; --ink: #2B2A25; --ink-soft: #5C5A4E;
    --pine: #33473F; --pine-deep: #22322C; --brick: #A85338; --gold: #B8925A;
    --line: rgba(43,42,37,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background: var(--paper); font-family: 'Noto Sans TC', sans-serif; color: var(--ink); overflow-x:hidden; }
  body{ background-image: radial-gradient(circle at 15% 10%, rgba(184,146,90,0.10), transparent 40%), radial-gradient(circle at 85% 90%, rgba(51,71,63,0.08), transparent 45%); }
  .wrap{ max-width: 880px; margin: 0 auto; padding: 20px 16px 40px; min-height:100vh; display:flex; flex-direction:column; }
  header{ display:flex; align-items:baseline; justify-content:space-between; padding-bottom:14px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
  .brand{ font-family:'Noto Serif TC', serif; font-weight:700; font-size: 18px; letter-spacing: 0.04em; color: var(--pine-deep); }
  .brand span{ display:block; font-family:'Noto Sans TC',sans-serif; font-weight:300; font-size:10px; letter-spacing:0.2em; color: var(--ink-soft); margin-top:3px; }
  .title-block{ text-align:center; margin-bottom: 14px; }
  h1{ font-family:'Noto Serif TC', serif; font-weight:700; font-size: clamp(22px, 5.5vw, 34px); color: var(--pine-deep); line-height:1.3; }
  .subtitle{ margin-top:6px; font-size:12px; color: var(--ink-soft); letter-spacing:0.03em; }

  /* ---- fast page navigation bar (replaces volume-nav; jump straight to a page) ---- */
  .jump-bar{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .jump-bar input{ width:64px; text-align:center; font-size:14px; padding:7px 6px; border-radius:6px; border:1px solid var(--line); background:#fff; }
  .jump-bar button{ font-size:13px; padding:7px 14px; border-radius:6px; border:1px solid var(--pine); background:transparent; color:var(--pine); cursor:pointer; }
  .jump-bar button:hover{ background: rgba(51,71,63,0.08); }
  .jump-bar .sep{ font-size:12px; color:var(--ink-soft); }

  .book-stage{ position:relative; display:flex; justify-content:center; align-items:center; margin: 0 auto 12px; width:100%; }
  .book{ position:relative; width: min(84vw, 420px); aspect-ratio: 408 / 596.4; border-radius: 3px; box-shadow: 0 2px 4px rgba(43,42,37,0.15), 0 18px 40px -12px rgba(34,50,44,0.35), 0 0 0 1px rgba(43,42,37,0.06); background: var(--pine-deep); overflow:hidden; touch-action: pan-y pinch-zoom; -webkit-user-select:none; user-select:none; }
  /* single <img>, we just swap its src — no per-page DOM, no 3D transform stack.
     This is the whole fix for the slowness/shake: earlier versions kept every
     page (or every page in a whole 90-150 page volume) as a stacked, rotated
     DOM node; here there is only ever ONE image element in the book at a time. */
  .book img{ width:100%; height:100%; display:block; object-fit: cover; opacity:0; transition: opacity 0.15s ease; }
  .book img.ready{ opacity:1; }
  .book .spinner{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(237,231,214,0.5); font-size:12px; letter-spacing:0.1em; }
  .nav-btn{ position:absolute; top:50%; transform: translateY(-50%); width:42px; height:42px; border-radius:50%; border:none; background: rgba(255,255,255,0.85); color: var(--pine-deep); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow: 0 4px 14px rgba(43,42,37,0.18); }
  .nav-btn:disabled{ opacity:0.25; cursor:default; }
  .nav-prev{ left: -6px; } .nav-next{ right: -6px; }
  @media (min-width: 640px){ .nav-prev{ left: -54px; } .nav-next{ right: -54px; } }
  .page-indicator{ text-align:center; font-size:12px; color: var(--ink-soft); letter-spacing:0.1em; margin-bottom:6px; }
  .page-indicator b{ color: var(--pine-deep); }
  .progress-track{ width: min(84vw, 420px); height:2px; background: var(--line); margin: 0 auto 30px; border-radius:2px; overflow:hidden; }
  .progress-fill{ height:100%; background: var(--brick); transition: width 0.15s ease; }
  .hint{ text-align:center; font-size:11px; color: var(--ink-soft); letter-spacing:0.05em; margin-bottom: 30px; }
  footer{ text-align:center; margin-top: 20px; padding-top:16px; border-top: 1px solid var(--line); font-size:11px; color: var(--ink-soft); letter-spacing:0.05em; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><a href="index.html" style="color:inherit; text-decoration:none;">← 法寶園地</a><span>ONLINE READING · 電子書自架</span></div>
  </header>
  <div class="title-block">
    <h1>佛說阿彌陀經通贊疏</h1>
    <div class="subtitle">窺基撰 · 全書 88 頁</div>
  </div>
  <div class="jump-bar">
    <input type="text" inputmode="numeric" pattern="[0-9]*" id="jumpInput" placeholder="頁碼" autocomplete="off">
    <button id="jumpBtn">跳到該頁</button>
    <span class="sep">共 88 頁</span>
  </div>
  <div class="book-stage">
    <button class="nav-btn nav-prev" id="prevBtn" aria-label="上一頁">‹</button>
    <div class="book" id="book">
      <div class="spinner" id="spinner">載入中…</div>
      <img id="pageImg" alt="">
    </div>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="下一頁">›</button>
  </div>
  <div class="page-indicator">第 <b id="curPage">1</b> / <span id="totalPage">88</span> 頁</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="hint">點左右箭頭、滑動，或按鍵盤方向鍵翻頁；也可以直接輸入頁碼跳頁</div>
<footer>香光淨宗學會 · 法寶園地電子書 &nbsp;|&nbsp; 本頁面自行架設，取代原付費平台</footer>
</div>
<script>
const TOTAL = 88;
const IMG_DIR = 'ab0103-images/';
function srcFor(n){ return IMG_DIR + String(n).padStart(4,'0') + '.jpg'; }

let current = 1; // 1-indexed, matches printed filenames / page-jump input
const pageImg = document.getElementById('pageImg');
const spinner = document.getElementById('spinner');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const curPageEl = document.getElementById('curPage');
const progressFill = document.getElementById('progressFill');
const jumpInput = document.getElementById('jumpInput');
const jumpBtn = document.getElementById('jumpBtn');

// Preload cache: a handful of Image() objects around the current page so
// tapping next/prev is instant even though nothing is embedded up front.
const cache = new Map();
function preload(n){
  if(n < 1 || n > TOTAL || cache.has(n)) return;
  const im = new Image();
  im.src = srcFor(n);
  cache.set(n, im);
}
function showPage(n, push){
  current = Math.min(Math.max(n,1), TOTAL);
  pageImg.classList.remove('ready');
  spinner.style.display = 'flex';
  const target = srcFor(current);
  const cached = cache.get(current);
  const finish = () => {
    pageImg.src = target;
    pageImg.classList.add('ready');
    spinner.style.display = 'none';
  };
  if(cached && cached.complete){ finish(); }
  else {
    const im = new Image();
    im.onload = finish;
    im.src = target;
    cache.set(current, im);
  }
  curPageEl.textContent = current;
  progressFill.style.width = ((current-1) / (TOTAL-1) * 100) + '%';
  prevBtn.disabled = current <= 1;
  nextBtn.disabled = current >= TOTAL;
  // warm the next couple of pages in both directions so the swipe/tap feels instant
  preload(current+1); preload(current+2); preload(current-1);
}
function next(){ if(current < TOTAL) showPage(current+1); }
function prev(){ if(current > 1) showPage(current-1); }

nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
document.addEventListener('keydown', (e) => { if(e.key === 'ArrowRight') next(); if(e.key === 'ArrowLeft') prev(); });
jumpBtn.addEventListener('click', () => {
  const n = parseInt(jumpInput.value, 10);
  if(!isNaN(n)) showPage(n);
});
jumpInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') jumpBtn.click(); });

// swipe: simple discrete gesture on release, no per-frame dragging of a big
// DOM tree — this is what keeps it smooth even on a large book.
let touchStartX = null, touchStartY = null;
const book = document.getElementById('book');
book.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, { passive: true });
book.addEventListener('touchend', (e) => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next(); else prev();
  }
  touchStartX = null; touchStartY = null;
});

// 放大時允許自由左右上下平移，縮回原尺寸時恢復左右滑動＝翻頁
function updateZoomState(){
  if(!window.visualViewport) return;
  const zoomedIn = window.visualViewport.scale > 1.02;
  book.style.touchAction = zoomedIn ? 'auto' : 'pan-y pinch-zoom';
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', updateZoomState);
  window.visualViewport.addEventListener('scroll', updateZoomState);
}

showPage(1);
</script>
</body>
</html>
